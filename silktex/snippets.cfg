snippet upkg,u,Use Package
	\usepackage{$1}$0
snippet begin,b,Environment
	\begin{${1:env}}
		$0
	\end{$1}
snippet tab,t,Tabular
	\begin{${1:tabular}}{${2:c}}
		$0
	\end{$1}
snippet img,g,Image
	\begin{figure}[htp]
	\centering
	\includegraphics[scale=${1:1.0}]{$2}
	\caption{$3}
	\label{$4}
	\end{figure}
	$0
snippet ali,a,Align
	\begin{align${1:ed}}
		$0
	\end{align$1}
snippet gat,,Gather
	\begin{gather${1:ed}}
		$0
	\end{gather$1}
snippet eq,e,Equation environment
	\begin{equation}
		$0
	\end{equation}
snippet ueq,,Unnumbered Equation
	\[
		$0
	\]
snippet aeq,,Aligned Equation
	\begin{align*}
		$0
	\end{align*}
snippet aneq,,Aligned-Numbered Equation
	\begin{align}
		$0
	\end{align}
snippet enum,n,Enumerate
	\begin{enumerate}
		\item $0
	\end{enumerate}
snippet item,i,Itemize
	\begin{itemize}
		\item $0
	\end{itemize}
snippet desc,d,Description
	\begin{description}
		\item[${1}] $0
	\end{description}
snippet mat,m,Matrix
	$\begin{${1:p/b/v/V/B/small}matrix}
		$0
	\end{$1matrix}$
snippet cas,c,Cases
	\begin{cases}
		${1:equation}, &\text{ if }${2:case}\\
		$0
	\end{cases}
snippet spl,s,Split
	\begin{split}
		$0
	\end{split}
snippet part,,Part
	\part{${1:part name}}
	\label{prt:${2}}
	$0
	% part $2 (end)
snippet cha,,Chapter
	\chapter{${1:chapter name}}
	\label{cha:${2}}
	$0
	% chapter $2 (end)
snippet sec,,Section
	\section{${1:section name}}
	\label{sec:${2}}
	$0
	% section $2 (end)
snippet sub,,Sub Section
	\subsection{${1:subsection name}}
	\label{sub:${2}}
	$0
	% subsection $2 (end)
snippet subs,,Sub Sub Section
	\subsubsection{${1:subsubsection name}}
	\label{ssub:${2}}
	$0
	% subsubsection $2 (end)
snippet par,,Paragraph
	\paragraph{${1:paragraph name}}
	\label{par:${2}}
	$0
	% paragraph $2 (end)
snippet subp,,Sub Paragraph
	\subparagraph{${1:subparagraph name}}
	\label{subp:${2}}
	$0
	% subparagraph $2 (end)
snippet itd,,Item
	\item[${1:description}] ${2:item}$0
snippet figure,,Figure Reference
	Figure~\ref{${2:fig:}}$0
snippet table,,Table Reference
	Table~\ref{${2:tab:}}$0
snippet listing,,Listing Reference
	Listing~\ref{${2:list}}$0
snippet section,,Section Reference
	Section~\ref{${2:sec:}}$0
snippet page,,Page Reference
	${1:page}~\pageref{${2}}$0
snippet frac,f,Fraction
	\frac{$1}{$2}$0
snippet cbrace,,Curly braces
	\left \{ $1 \right \}$0
